<!DOCTYPE html>
<html>
<head>
    <title>TapSense Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* This centers the button and title vertically */
            align-items: center;
            transition: background 0.2s;
            overflow: hidden; /* Prevents accidental scrollbars */
        }

        /* Making the title bigger and more "Dashboard" style */
        h1 {
            font-size: 70px;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Moving the numbers to the bottom-right corner */
        #value {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 80px; /* Smaller than 150px so it fits nicely in the corner */
            font-weight: bold;
            font-family: monospace; /* Monospace keeps numbers from "jumping" when they change */
            opacity: 0.6; /* Makes it look like a sleek overlay */
        }

        button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50px; /* More rounded "pill" shape */
            border: none;
            background: #6200ee;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.95); /* Little bounce when you click */
        }

        button:hover {
            background: #7c4dff;
        }
    </style>
</head>
<body>

<h1>TapSense</h1>
<button id="connectBtn">Connect to CPB</button>

<div id="value">0.00</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const valueDisplay = document.getElementById('value');
    let buffer = "";

    const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const UART_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    connectBtn.addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CPB-Motion' }],
                optionalServices: [UART_SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            const characteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);

            await characteristic.startNotifications();
            connectBtn.innerText = "Connected!";
            connectBtn.style.background = "#4caf50";

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const chunk = decoder.decode(event.target.value);
                buffer += chunk;

                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    const completeLine = lines[0].trim();
                    buffer = lines.slice(1).join('\n');

                    const val = parseFloat(completeLine);

                    if (!isNaN(val)) {
                        valueDisplay.innerText = val.toFixed(2);

                        // Background Color Logic matching your CPB code
                        if (val >= 8.0) {
                            document.body.style.backgroundColor = "red";
                        }
                        else if (val >= 4.0) {
                            document.body.style.backgroundColor = "purple";
                        }
                        else if (val > 1.0) {
                            document.body.style.backgroundColor = "blue";
                        }
                        else {
                            document.body.style.backgroundColor = "#121212";
                        }
                    }
                }
            });
        } catch (error) {
            console.error(error);
            alert("Connection failed. Make sure Bluetooth is on and the board isn't connected to your phone!");
        }
    });
</script>
</body>
</html>
