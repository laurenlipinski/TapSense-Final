<!DOCTYPE html>
<html>
<head>
    <title>TapSense Dashboard</title>
    <style>
        :root {
            --current-color: #6200ee;
        }

        body {
            font-family: sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.4s ease;
            overflow: hidden;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--current-color);
            filter: brightness(1.5);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        #instructions {
            font-size: 22px;
            margin: 20px 0 40px 0;
            opacity: 0.8;
            max-width: 500px;
            line-height: 1.6;
            font-weight: 300;
            transition: opacity 0.5s;
        }

        body.connected h1 {
            font-size: 35px;
            position: absolute;
            top: 40px;
        }

        body.connected #instructions,
        body.connected #connectBtn {
            opacity: 0;
            pointer-events: none;
        }

        #value {
            position: absolute;
            bottom: 80px; /* Moved up slightly to make room for the key */
            right: 30px;
            font-size: 60px;
            font-weight: bold;
            font-family: monospace;
            opacity: 0;
            transition: opacity 1s;
        }

        body.connected #value {
            opacity: 0.4;
        }

        /* --- Intensity Key Styles --- */
        #intensityKey {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px); /* Modern frosted glass look */
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 0;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.8s ease;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.connected #intensityKey {
            opacity: 1;
            transform: translateY(0);
        }

        .key-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        button {
            padding: 20px 45px;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: #6200ee;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.1s, background 0.2s, opacity 0.5s;
        }

        button:hover { background: #7c4dff; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<h1 id="logo">TapSense</h1>

<div id="instructions">
    Let’s get started with TapSense!<br>
    Connect your device to begin tracking.
</div>

<button id="connectBtn">Connect Board</button>

<div id="value">0.00</div>

<div id="intensityKey">
    <div class="key-item">
        <div class="dot" style="background: blue; color: blue;"></div>
        <span>Light</span>
    </div>
    <div class="key-item">
        <div class="dot" style="background: purple; color: purple;"></div>
        <span>Medium</span>
    </div>
    <div class="key-item">
        <div class="dot" style="background: red; color: red;"></div>
        <span>Hard</span>
    </div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const valueDisplay = document.getElementById('value');
    let buffer = "";

    const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const UART_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    connectBtn.addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CPB-Motion' }],
                optionalServices: [UART_SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            const characteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);

            await characteristic.startNotifications();

            connectBtn.innerText = "Connected!";
            connectBtn.style.background = "#4caf50";

            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const chunk = decoder.decode(event.target.value);
                buffer += chunk;

                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    const completeLine = lines[0].trim();
                    buffer = lines.slice(1).join('\n');

                    const val = parseFloat(completeLine);

                    if (!isNaN(val)) {
                        valueDisplay.innerText = val.toFixed(2);
                        document.body.classList.add('connected');

                        let newBg = "#121212";
                        if (val >= 8.0) { newBg = "red"; }
                        else if (val >= 4.0) { newBg = "purple"; }
                        else if (val > 1.0) { newBg = "blue"; }

                        document.body.style.backgroundColor = newBg;

                        const logoColor = (newBg === "#121212") ? "#6200ee" : newBg;
                        document.documentElement.style.setProperty('--current-color', logoColor);
                    }
                }
            });
        } catch (error) {
            console.error(error);
            alert("Connection failed. Make sure Bluetooth is on and the CPB isn't connected to another device!");
        }
    });
</script>
</body>
</html>
